<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </div>
            
            <nav class="nav-menu">
                <ul>
                    <li class="active"><i class="fas fa-home"></i> Home</li>
                    <li><i class="fas fa-search"></i> Search</li>
                    <li><i class="fas fa-book-open"></i> Your Library</li>
                </ul>
            </nav>

            <div class="nav-actions">
                <ul>
                    <li><i class="fas fa-plus-square"></i> Create Playlist</li>
                    <li><i class="fas fa-heart"></i> Liked Songs</li>
                </ul>
            </div>
            
            <div class="divider"></div>
            
            <div class="playlists">
                <ul>
                    <li>My Playlist #1</li>
                    <li>Coding Mix</li>
                    <li>Chill Vibes</li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="nav-buttons">
                    <button class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="user-profile">
                    <button class="upgrade-btn">Upgrade</button>
                    <div class="profile-icon"><i class="fas fa-user"></i></div>
                </div>
            </header>
            
            <div class="content-header">
                <div class="playlist-info">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=200&h=200" alt="Playlist Cover" class="playlist-cover">
                    <div class="playlist-details">
                        <span class="type">Playlist</span>
                        <h1>Discover Weekly</h1>
                        <p class="description">Your weekly mixtape of fresh music.</p>
                        <div class="meta">
                            <i class="fab fa-spotify"></i> <strong>Spotify</strong> • 5 songs
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="playlist-actions">
                <button class="play-all-btn" id="masterPlayAll"><i class="fas fa-play"></i></button>
                <button class="icon-btn"><i class="far fa-heart"></i></button>
                <button class="icon-btn"><i class="fas fa-ellipsis-h"></i></button>
            </div>

            <div class="song-list-container">
                <div class="song-list-header">
                    <div class="col-title">#</div>
                    <div class="col-title">Title</div>
                    <div class="col-title">Album</div>
                    <div class="col-title"><i class="far fa-clock"></i></div>
                </div>
                <div class="divider-line"></div>
                <div class="song-list" id="songList">
                    <!-- Songs will be populated here via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- Playback Bar -->
    <div class="player-bar">
        <div class="now-playing">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=60&h=60" alt="Album Art" id="currentCover" class="cover-art">
            <div class="track-info">
                <div class="track-name" id="currentTitle">Select a song</div>
                <div class="artist-name" id="currentArtist">...</div>
            </div>
            <button class="icon-btn small"><i class="far fa-heart"></i></button>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <button class="icon-btn"><i class="fas fa-random"></i></button>
                <button class="icon-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="play-pause-btn" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="icon-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                <button class="icon-btn"><i class="fas fa-redo"></i></button>
            </div>
            <div class="playback-bar">
                <span class="time current-time" id="currentTime">0:00</span>
                <div class="progress-container">
                    <input type="range" min="0" max="100" value="0" class="progress-bar" id="progressBar">
                </div>
                <span class="time total-time" id="totalTime">0:00</span>
            </div>
        </div>
        
        <div class="extra-controls">
            <button class="icon-btn"><i class="fas fa-microphone"></i></button>
            <button class="icon-btn"><i class="fas fa-stream"></i></button>
            <button class="icon-btn"><i class="fas fa-desktop"></i></button>
            <div class="volume-control">
                <button class="icon-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" min="0" max="100" value="100" class="volume-bar" id="volumeBar">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
